workflows:
  - name: smoke                   # the slice-① example workflow
    gate:
      min_accuracy: 0.5
      primary_axis: cost
  - name: classification          # gate anchored to the Gemini 2.5 Pro baseline (2026-06-21)
    gate:
      min_accuracy: 0.90           # incumbent 0.948 − ~2σ (stderr 0.025); a candidate must roughly match Gemini
      max_latency_s: 45.0          # ~Gemini p95 (41.2s) + headroom
      max_cost_per_sample_usd: 0.03  # ~Gemini $/doc ($0.024) + headroom
      primary_axis: cost
  - name: rag_qa                  # gate anchored to the Gemini 2.5 Pro baseline (2026-06-21 run)
    gate:
      min_accuracy: 0.85          # incumbent factfulness 0.923 − ~1.4σ; a candidate must roughly match Gemini
      max_latency_s: 60.0         # generous (RAG isn't real-time) — flags unusable models, not tail tradeoffs
      max_cost_per_sample_usd: 0.05  # generous; both candidates well under
      primary_axis: cost
