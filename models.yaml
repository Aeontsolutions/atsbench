# The registry you edit to add a model. provider = Inspect model string.
# Models route through OpenRouter (one OPENROUTER_API_KEY, no base URL): provider = openrouter/<slug>.
# For fair A/B runs, pin the backend + forbid quantization, e.g.:
#   -M provider='{"order":["z-ai"],"allow_fallbacks":false,"quantizations":["fp16","bf16"]}'
# Cost = the prices below x token counts (independent of the serving path) — set them to the pricing
# you're modeling and confirm against openrouter.ai/models.
models:
  - name: gemini-2.5-pro          # current incumbent — benchmarked first to set the baseline
    provider: openrouter/google/gemini-2.5-pro
    price_per_1m_input: 1.25
    price_per_1m_output: 10.0
    trusted: true
  - name: glm-5.2
    provider: openrouter/z-ai/glm-5.2   # confirmed from OpenRouter (reasoning model — see run notes)
    price_per_1m_input: 1.20            # real OpenRouter pricing (2026-06-21)
    price_per_1m_output: 4.10
    trusted: false                # external — keep sensitive fixtures away from it
  - name: mock                    # zero-cost smoke/CI model
    provider: mockllm/model
    price_per_1m_input: 0.0
    price_per_1m_output: 0.0
    trusted: true
